<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
	<head>
		<title th:text="${title}"></title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
		rel="stylesheet">
	</head>
	<body class="bg-light">
		<div class="container mt-5 mb-5">
			<div class="card shadow">
				<!-- ヘッダー -->
				<div class="card-header bg-primary text-white">
					<div class="d-flex justify-content-between align-items-center">
						<h3 class="mb-0">シンプル掲示板システム</h3>
						<div class="d-flex align-items-center gap-2">
				
							<!-- 管理者の場合：ユーザー名を押すと管理者画面へ -->
							<a th:if="${loginUser.role == T(com.example.simpleforum.model.Role).ADMIN}"
							   th:href="@{/admin/users}"
							   class="bg-white border rounded px-2 py-1 d-flex align-items-center gap-2 text-decoration-none">
								<span class="text-dark" th:text="${loginUser.userName}">ユーザー名</span>
								<span class="badge bg-secondary" th:text="${loginUser.role.label}">ロール</span>
							</a>
				
							<!-- 一般ユーザーの場合：クリックできない表示 -->
							<div th:if="${loginUser.role != T(com.example.simpleforum.model.Role).ADMIN}"
							     class="bg-white border rounded px-2 py-1 d-flex align-items-center gap-2">
								<span class="text-dark" th:text="${loginUser.userName}">ユーザー名</span>
								<span class="badge bg-secondary" th:text="${loginUser.role.label}">ロール</span>
							</div>
				
							<form th:action="@{/logout}" method="post" class="mb-0">
								<button type="submit" class="btn btn-light btn-sm btn-outline-danger">ログアウト</button>
							</form>
						</div>
					</div>
				</div>
				
				<div class="card-body p-4">
					<!-- エラーメッセージ -->
					<div th:if="${msg}" class="alert alert-danger" th:text="${msg}"></div>
				
					<!-- 表示領域(フォーム) -->
					<form th:action="${formAction}" method="post">
				
						<div class="mb-3" th:if="${showTitle}">
							<label class="form-label">タイトル</label>
				
							<!-- 作成・編集用パーツ -->
							<input th:if="${!readonly}" type="text" name="title"
								class="form-control" th:value="${data != null ? data.title : ''}"
								maxlength="100" />
				
							<!-- 削除確認用パーツ -->
							<div th:if="${readonly}" class="form-control-plaintext border-bottom"
								th:text="${data.title}"></div>
						</div>
				
						<div class="mb-3">
							<label class="form-label" th:text="${showTitle} ? '本文' : 'コメント'"></label>
				
							<!-- 作成・編集用パーツ -->
							<textarea th:if="${!readonly}" name="text" class="form-control"
								rows="8" th:text="${data != null ? data.text : ''}"></textarea>
				
							<!-- 削除確認用パーツ -->
							<div th:if="${readonly}" class="form-control-plaintext border-bottom"
								style="white-space: pre-wrap;" th:text="${data.text}"></div>
						</div>
				
						<!-- 操作ボタン -->
						<button type="submit" class="btn btn-primary" th:text="${submitLabel}"></button>
						<a th:href="${cancelHref}" class="btn btn-danger">キャンセル</a>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
<title th:text="${title}"></title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="container">
	<!-- 上部 -->
	<div class="d-flex justify-content-between align-items-center my-3">
		<h1>
			<a th:href="@{/posts}" class="display-4 text-decoration-none"
				th:text="${title}"></a>
		</h1>
		<div class="text-end">
			<span th:text="${loginUser.userName}"></span> <span
				class="badge bg-secondary" th:text="${loginUser.role}"></span>
			<form th:action="@{/logout}" method="post" class="d-inline">
				<button type="submit" class="btn btn-sm btn-outline-danger">ログアウト</button>
			</form>
		</div>
	</div>

	<!-- エラーメッセージ -->
	<div th:if="${msg}" class="alert alert-danger" th:text="${msg}"></div>

	<!-- 表示領域(フォーム) -->
	<form th:action="${formAction}" method="post">

		<div class="mb-3" th:if="${showTitle}">
			<label class="form-label">タイトル</label>

			<!-- 作成・編集用パーツ -->
			<input th:if="${!readonly}" type="text" name="title"
				class="form-control" th:value="${data != null ? data.title : ''}"
				maxlength="100" />

			<!-- 削除確認用パーツ -->
			<div th:if="${readonly}" class="form-control-plaintext border-bottom"
				th:text="${data.title}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" th:text="${showTitle} ? '本文' : 'コメント'"></label>

			<!-- 作成・編集用パーツ -->
			<textarea th:if="${!readonly}" name="text" class="form-control"
				rows="8" th:text="${data != null ? data.text : ''}"></textarea>

			<!-- 削除確認用パーツ -->
			<div th:if="${readonly}" class="form-control-plaintext border-bottom"
				style="white-space: pre-wrap;" th:text="${data.text}"></div>
		</div>

		<!-- 操作ボタン -->
		<button type="submit" class="btn btn-primary" th:text="${submitLabel}"></button>
		<a th:href="${cancelHref}" class="btn btn-danger">キャンセル</a>
	</form>
</body>
</html>

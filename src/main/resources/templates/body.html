<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>本文ページ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f4f8f1;">

<div class="container mt-5 mb-5">

	<div class="card shadow border-0" style="border-radius:15px;">

		<!-- ヘッダー -->
		<div class="card-header text-white" style="background-color:#7b9b63;">
			<div class="d-flex justify-content-between align-items-center">
				<h3 class="mb-0">シンプル掲示板システム</h3>
					<div class="text-end">
						<!-- 管理者の場合：ユーザー名を押すと管理者画面へ -->
						<a
							th:if="${loginUser.role == T(com.example.simpleforum.model.Role).ADMIN}"
							href="/admin/users"
							class="bg-white text-dark border rounded px-4 py-1 d-block text-decoration-none">
							<span th:text="${loginUser.userName}">ユーザーID</span>
						</a>

						<!-- 一般ユーザーの場合：クリックできない表示 -->
						<div
							th:if="${loginUser.role != T(com.example.simpleforum.model.Role).ADMIN}"
							class="bg-white text-dark border rounded px-4 py-1">
							<span th:text="${loginUser.userName}">ユーザーID</span>
						</div>

						<!-- ログアウトを押すとログインページへ移動 -->
						<form th:action="@{/logout}" method="post">
							<button type="submit" class="btn btn-light btn-sm w-100 mt-1">ログアウト</button>
						</form>
					</div>
				</div>
		</div>

		<div class="card-body p-4">
			<!-- 投稿カード -->
			
				
					<!-- 投稿タイトル -->
					<h3 class="mb-4 fw-bold" style="color: #5f7750;">
						🍃 <span th:text="${post.title}">投稿タイトル</span>
					</h3>
						<!-- 投稿日時・投稿者・コメント返信ボタン -->
					<table class="table table-bordered text-center mb-4">
						<tr style="background-color:#eef4ea;">
							<th>日時</th>
							<th>投稿者</th>
							<th>コメント・返信</th>
						</tr>

						<tr>
							<td class="align-middle" th:text="${post.createdAt}"></td>
							<td class="align-middle" th:text="${post.user.userName}"></td>
							<td class="align-middle">
							</td>
						</tr>
					</table>

					<!-- 投稿本文 -->
					<div class="border rounded p-4" style="background-color:#f8faf5;">
						<p class="mb-0" th:text="${post.text}">本文</p>
					</div>
					<div class="border rounded p-4 bg-light">
					
						<a th:href="@{/comments/new(postId=${post.id})}" class="btn btn-primary">コメント・返信</a>
					</div>
				</div>

			</div>
			
			<!-- コメント一覧 -->
			<div class="card mb-4 mt-4">
				<div class="card-header" style="background-color:#eef4ea;">
					<h5 class="mb-0">コメント一覧</h5>
				</div>

				<div class="card-body">
					<!-- コメントがない場合 -->
					<div th:if="${post.comments == null || post.comments.isEmpty()}" class="text-center" style="color:#7b8f69;">コメントはまだありません。</div>
					<!-- コメントを1件ずつ表示 -->
					<div th:each="comment : ${post.comments}" class="border rounded p-3 mb-3 bg-white">
						<div class="d-flex justify-content-between align-items-start mb-2">
							<div>
								<strong th:text="${comment.user.userName}">コメント投稿者</strong>
								<span class="text-muted ms-2" th:text="${comment.createdAt}">コメント日時</span>
							</div>

							<!-- コメント削除フォーム -->
							<form method="post" th:action="@{/comments/delete/{id}(id=${comment.id})}">
								<!-- コメント作成者本人または管理者のみ表示 -->
								<button
									th:if="${comment.user.id == loginUser.id || loginUser.role == T(com.example.simpleforum.model.Role).ADMIN}"
									type="submit" class="btn btn-sm btn-outline-danger"
									onclick="return confirm('このコメントを削除しますか？');">削除
								</button>
							</form>

						</div>

						<!-- コメント本文 -->
						<p class="mb-0" th:text="${comment.text}">コメント本文</p>

					</div>

				</div>

			</div>
			
			</div>

			<!-- タイトルページへ戻る -->
			<div class="text-center" mt-3>
				<a href="/posts" class="btn text-white px-4" style="background-color:#6f8f5f;">投稿一覧へ</a>
			</div>

		</div>

	</div>

</div>

</body>
</html>

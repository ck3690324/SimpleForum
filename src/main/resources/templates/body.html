<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>本文ページ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

	<div class="card shadow">

		<!-- ヘッダー -->
		<div class="card-header bg-primary text-white">
			<div class="d-flex justify-content-between align-items-center">
				<h3 class="mb-0">シンプル掲示板システム</h3>
				<div class="text-end">
					<div class="bg-white text-dark border rounded px-4 py-1" th:text="${loginUser.userName}">ユーザーID</div>
					<a href="/logout" class="btn btn-light btn-sm w-100 mt-1">ログアウト</a>
				</div>		
			</div>
		</div>

		<div class="card-body p-4">
			<!-- 投稿カード -->
			<div class="card mb-4">
				<!-- 投稿タイトル -->
				<div class="card-header bg-secondary text-white text-center">
					<h4 class="mb-0" th:text="${post.title}">投稿タイトル</h4>
				</div>

				<div class="card-body">
					<!-- 投稿日時・投稿者・コメント返信ボタン -->
					<table class="table table-bordered text-center mb-4">
						<tr class="table-light">
							<th>日時</th>
							<th>投稿者</th>
							<th>コメント・返信</th>
						</tr>

						<tr>
							<td class="align-middle" th:text="${post.createdAt}"></td>
							<td class="align-middle" th:text="${post.user.userName}"></td>
							<td class="align-middle">
								
							</td>
						</tr>
					</table>

					<!-- 投稿本文 -->
					<div class="border rounded p-4 bg-light">
						<p class="mb-0" th:text="${post.text}">本文</p>
					</div>
					<div class="border rounded p-4 bg-light">
					
						<a th:href="@{/comments/new(postId=${post.id})}" class="btn btn-primary">コメント・返信</a>
					</div>
				</div>

			</div>

			<!-- コメント一覧 -->
			<div class="card mb-4">
				<div class="card-header bg-light">
					<h5 class="mb-0">コメント一覧</h5>
				</div>

				<div class="card-body">
					<!-- コメントがない場合 -->
					<div th:if="${post.comments == null || post.comments.isEmpty()}" class="text-center text-muted">コメントはまだありません。</div>
					<!-- コメントを1件ずつ表示 -->
					<div th:each="comment : ${post.comments}" class="border rounded p-3 mb-3 bg-white">
						<div class="d-flex justify-content-between align-items-start mb-2">
							<div>
								<strong th:text="${comment.user.userName}">コメント投稿者</strong>
								<span class="text-muted ms-2" th:text="${comment.createdAt}">コメント日時</span>
							</div>

							<!-- コメント削除フォーム -->
							<form method="post" th:action="@{/comments/delete/{id}(id=${comment.id})}">
								<!-- コメント作成者本人または管理者のみ表示 -->
								<button
									th:if="${comment.user.id == loginUser.id || loginUser.role == T(com.example.simpleforum.model.Role).ADMIN}"
									type="submit" class="btn btn-sm btn-outline-danger"
									onclick="return confirm('このコメントを削除しますか？');">削除
								</button>
							</form>

						</div>

						<!-- コメント本文 -->
						<p class="mb-0" th:text="${comment.text}">コメント本文</p>

					</div>

				</div>

			</div>

			<!-- タイトルページへ戻る -->
			<div class="text-center">
				<a href="/posts" class="btn btn-secondary px-4">投稿一覧へ</a>
			</div>

		</div>

	</div>

</div>

</body>
</html>

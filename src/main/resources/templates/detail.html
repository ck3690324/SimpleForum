<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
	<head>
	<title th:text="${title}"></title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
		rel="stylesheet">
	</head>
	<body class="bg-light">
		<div class="container mt-5 mb-5">
			<div class="card shadow">
	
				<!-- ヘッダー -->
				<div class="card-header bg-primary text-white">
					<div class="d-flex justify-content-between align-items-center">
						<h3 class="mb-0">シンプル掲示板システム</h3>
						<div class="d-flex align-items-center gap-2">
							<div
								class="bg-white border rounded px-2 py-1 d-flex align-items-center gap-2">
								<span class="text-dark" th:text="${loginUser.userName}">ユーザー名</span>
								<span class="badge bg-secondary" th:text="${loginUser.role.label}">ロール</span>
							</div>
							<form th:action="@{/logout}" method="post" class="mb-0">
								<button type="submit" class="btn btn-light btn-sm btn-outline-danger">ログアウト</button>
							</form>
						</div>
					</div>
				</div>
	
	
				<div class="card-body p-4">
					<!-- 投稿カード -->
					<div class="card mb-4">
						<!-- 投稿タイトル -->
						<div class="card-header bg-secondary text-white">
							<h4 class="mb-0" th:text="${data.title}"></h4>
						</div>
	
						<div class="card-body">
							<div class="border rounded p-3 mb-3 bg-light">
								<!-- 投稿者、日時、編集、削除ボタン -->
								<div class="d-flex justify-content-between align-items-center mb-2">
									<p class="text-muted mb-0">
										<span th:text="${data.user != null ? data.user.userName : '削除済みのユーザー'}"></span>
										/
										<span th:text="${#temporals.format(data.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
									</p>
									<div class="d-flex gap-2" th:if="${canEdit}">
										<a th:href="@{/posts/edit/{id}(id=${data.id})}" class="btn btn-outline-secondary btn-sm">編集</a>
										<a th:href="@{/posts/delete/{id}(id=${data.id})}" class="btn btn-outline-danger btn-sm">削除</a>
									</div>
								</div>
	
								<!-- 投稿本文 -->
								<p class="mb-0" style="white-space: pre-wrap;" th:text="${data.text}">本文</p>
							</div>
	
							<!-- コメントボタン -->
							<div class="d-flex justify-content-center">
								<a th:href="@{/comments/new/{id}(id=${data.id})}" class="btn btn-primary btn-sm">コメント</a>
							</div>
						</div>
					</div>
	
					<!-- コメント一覧 -->
					<div class="card mb-4">
						<div class="card-header bg-light">
							<h5 class="mb-0">コメント</h5>
						</div>
	
						<div class="card-body">
							<!-- コメントがない場合 -->
							<div th:if="${comments == null || comments.isEmpty()}" class="text-center text-muted">コメントはまだありません。</div>
	
							<!-- コメントを1件ずつ表示 -->
							<div th:each="comment : ${comments}"
								class="border rounded p-3 mb-3 bg-white">
								<div class="d-flex justify-content-between align-items-center mb-2">
									<p class="text-muted mb-0">
										<span th:text="${comment.user != null ? comment.user.userName : '削除済みのユーザー'}"></span>
										/
										<span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
									</p>
									<div class="d-flex gap-2"
										th:if="${comment.user != null && (comment.user.id.equals(loginUser.id) || loginUser.role.name() == 'ADMIN')}">
										<a th:href="@{/comments/edit/{id}(id=${comment.id})}" class="btn btn-sm btn-outline-secondary">編集</a>
										<a th:href="@{/comments/delete/{id}(id=${comment.id})}" class="btn btn-sm btn-outline-danger">削除</a>
									</div>
								</div>
	
								<!-- コメント本文 -->
								<p class="mb-0" style="white-space: pre-wrap;"
									th:text="${comment.text}">コメント本文</p>
							</div>
	
							<!-- コメントボタン -->
							<div class="d-flex justify-content-center">
								<a th:href="@{/comments/new/{id}(id=${data.id})}" class="btn btn-primary btn-sm">コメント</a>
							</div>
						</div>
					</div>
	
					<!-- 投稿一覧へ戻る -->
					<div class="text-center">
						<a th:href="@{/posts}" class="btn btn-secondary px-4">投稿一覧へ</a>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>

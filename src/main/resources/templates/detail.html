<!DOCTYPE html>
<html
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
	<head>
		<title th:text="${title}"></title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>
	<body class="container">
		<!-- 上部 -->
		<div class="d-flex justify-content-between align-items-center my-3">
			<h1>
				<a th:href="@{/posts}" class="display-4 text-decoration-none" th:text="${title}"></a>
			</h1>
			<div class="text-end">
				<span th:text="${loginUser.userName}"></span>
				<span class="badge bg-secondary" th:text="${loginUser.role}"></span>
				<form th:action="@{/logout}" method="post" class="d-inline">
					<button type="submit" class="btn btn-sm btn-outline-danger">ログアウト</button>
				</form>
			</div>
		</div>

		<div class="--bs-dark-border-subtle">
			<p class="text-muted">
				投稿者：<span th:text="${data.user != null ? data.user.userName : '削除済みのユーザー'}"></span>
				/
				作成日時：<span th:text="${#temporals.format(data.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
			</p>	
			<p style="white-space: pre-wrap;" th:text="${data.text}"></p>
		</div>

		<div class="my-3 d-flex gap-2">
		    <a th:href="@{/posts/{id}/comments/new(id=${data.id})}" class="btn btn-outline-primary">返信する</a>
			<div th:if="${canEdit}">
			    <a th:href="@{/posts/{id}/edit(id=${data.id})}" class="btn btn-outline-secondary">編集</a>
			    <a th:href="@{/posts/{id}/delete(id=${data.id})}" class="btn btn-outline-danger">削除</a>
			</div>
		</div>
		
		<a th:href="@{/posts}" class="btn btn-link text-decoration-none">一覧に戻る</a>
	</body>
</html>

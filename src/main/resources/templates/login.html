<!DOCTYPE html>
<html
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
	<head>
		<title th:text="${title}"></title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>
	<body class="bg-light">
		<div class="container mt-5 mb-5">
			<div class="card shadow">
				<!-- ヘッダー -->
				<div class="card-header bg-primary text-white">
					<h3 class="d-flex justify-content-between align-items-center mb-0" th:text="${title}"></h3>
				</div>
			
				<!-- 本体 -->
				<div class="card-body p-4">
					<p th:text="${msg}"></p>
					<form th:action="@{/login}" method="post">
						<div class="mb-3">
							<label class="form-label">ユーザー名</label> <input type="text" name="username" class="form-control" />
						</div>
						<div class="mb-3">
							<label class="form-label">パスワード</label> <input type="password" name="password" class="form-control" />
						</div>
						<div class="mb-3">
							<input type="submit" value="ログイン" class="btn btn-primary" />
							<button type="submit" th:formaction="@{/register}" class="btn btn-success">新規登録</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>

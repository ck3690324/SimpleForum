<!DOCTYPE html>
<html
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
	<head>
		<title th:text="${title}"></title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>
	<body class="container">
		<!-- 上部 -->
		<div class="d-flex justify-content-between align-items-center my-3">
			<h1>
				<a th:href="@{/posts}" class="display-4 text-decoration-none" th:text="${title}"></a>
			</h1>
			<div class="text-end">
				<span th:text="${loginUser.userName}"></span>
				<span class="badge bg-secondary" th:text="${loginUser.role}"></span>
				<form th:action="@{/logout}" method="post" class="d-inline">
					<button type="submit" class="btn btn-sm btn-outline-danger">ログアウト</button>
				</form>
			</div>
		</div>
		
		<!-- ポストリスト -->
		<a th:href="@{/posts/new}" class="btn btn-primary mb-3">新規投稿</a>

		<table class="table table-striped">
			<thead>
				<tr>
					<th>タイトル</th>
					<th>投稿者</th>
					<th>作成日時</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="post : ${data}">
					<td><a class="text-decoration-none" th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a></td>
					<td th:text="${post.user != null ? post.user.userName : '削除済みのユーザー'}"></td>
					<td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
				</tr>
			</tbody>
		</table>
	</body>
</html>

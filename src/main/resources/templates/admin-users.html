
<!--
 * 管理者ユーザー管理画面
 * 管理者が登録ユーザー一覧を確認する画面
 * ユーザー情報の確認および削除を行う
 * 自分自身は削除できない
-->

<!DOCTYPE html>
<html>

<head>
<!-- 文字コード設定 -->
<meta charset="UTF-8">

<!-- ブラウザタイトル -->
<title>ユーザー管理</title>

<!-- Bootstrap読込 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- 背景色 -->
<body class="bg-light">

	<!-- 画面全体コンテナ -->
	<div class="container mt-5 mb-5">

		<!-- メインカード -->
		<div class="card shadow border-0">

			<!-- ===== ヘッダー ===== -->
			<div class="card-header bg-dark text-white py-3">

				<div class="d-flex justify-content-between align-items-center">
					<!-- 画面タイトル -->
					<div>				
						<h3 class="mb-0"><a href="/posts" class="text-white text-decoration-none"> 管理者ページ </a></h3>
						<small>ユーザー管理</small>
					</div>

					<!-- ログインユーザー情報 -->
					<div class="text-end">
						<div class="small mb-1">ログイン中</div>
						<!-- ログインユーザー名表示 -->
						<div class="fw-bold" th:text="${loginUser.userName}">ユーザーID</div>
						<!-- ログアウトボタン -->
						<form th:action="@{/logout}" method="post">
							<button type="submit" class="btn btn-outline-light btn-sm mt-2">ログアウト</button>
						</form>
					</div>

				</div>

			</div>

			<!-- ===== メインコンテンツ ===== -->
			<div class="card-body p-4">

				<!-- ===== ユーザー一覧 ===== -->
				<div class="card border-0 shadow-sm">
					<div class="card-header bg-white">
						<h5 class="mb-0">ユーザー一覧</h5>
					</div>

					<div class="card-body p-0">
						<!-- ユーザー一覧テーブル -->
						<table class="table table-hover table-bordered text-center mb-0">
							<!-- テーブルヘッダー -->
							<thead class="table-dark">
								<tr>
									<th>ユーザーID</th>
									<th>ユーザー名</th>
									<th>権限</th>
									<th>登録日時</th>
									<th>操作</th>
								</tr>
							</thead>

							<!-- ユーザー一覧表示 -->
							<tbody>
								<!-- ユーザーを1件ずつ表示 -->
								<tr th:each="user : ${users}">
									<!-- ユーザーID -->
									<td class="align-middle" th:text="${user.id}"></td>
									<!-- ユーザー名 -->
									<td class="align-middle fw-bold" th:text="${user.userName}">
									</td>
									<!-- 権限表示 -->
									<td class="align-middle">
										<!-- 管理者 --> 
										<span th:if="${user.role == T(com.example.simpleforum.model.Role).ADMIN}" class="badge bg-danger"> ADMIN </span> 
										<!-- 一般ユーザー --> 
										<span th:if="${user.role == T(com.example.simpleforum.model.Role).USER}"class="badge bg-secondary"> USER </span>
									</td>

									<!-- 登録日時 -->
									<td class="align-middle" th:text="${user.createdAt}"></td>

									<!-- 削除ボタン -->
									<td class="align-middle">
										<!-- 自分以外のユーザーのみ削除可能 --> 
										<a th:if="${!user.id.equals(loginUser.id)}" th:href="@{/admin/user/delete/{id}(id=${user.id})}"
										class="btn btn-sm btn-outline-danger" onclick="return confirm('このユーザーを削除しますか？');"> 削除 </a> 
										<!-- 自分自身 -->
										<span th:if="${user.id == loginUser.id}" class="badge bg-primary"> 自分 </span>
									</td>
								</tr>
							</tbody>

						</table>

					</div>

				</div>

				<!-- ===== 戻るボタン ===== -->
				<div class="text-center mt-4">
					<a href="/posts" class="btn btn-secondary px-4"> タイトルページへ </a>
				</div>

			</div>

		</div>

	</div>

</body>
</html>

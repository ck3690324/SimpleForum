<!DOCTYPE html>
<html
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
	<head>
		<title>シンプルフォーラム | 管理者</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>
	<body class="bg-light">
		<div class="container mt-5 mb-5">
			<div class="card shadow border-0">
				<div class="card-header bg-dark text-white py-3">
					<div class="d-flex justify-content-between align-items-center">
						<div>				
							<h3 class="mb-0"><a href="/posts" class="text-white text-decoration-none">シンプルフォーラム</a></h3>
							<small>ユーザー管理</small>
						</div>
						<div class="text-end">
							<div class="fw-bold" th:text="${loginUser.userName}">ユーザーID</div>
							<form th:action="@{/logout}" method="post">
								<button type="submit" class="btn btn-outline-light btn-sm mt-2">ログアウト</button>
							</form>
						</div>
					</div>
				</div>
	
				<div class="card-body p-4">
					<div class="card border-0 shadow-sm">
						<div class="card-header bg-white">
							<h5 class="mb-0">ユーザー一覧</h5>
						</div>
	
						<div class="card-body p-0">
							<table class="table table-hover table-bordered text-center mb-0">
								<thead class="table-dark">
									<tr>
										<th>ユーザーID</th>
										<th>ユーザー名</th>
										<th>権限</th>
										<th>登録日時</th>
										<th>操作</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="user : ${users}" style="height: 50px;">
										<td class="align-middle" th:text="${user.id}"></td>
										<td class="align-middle fw-bold" th:text="${user.userName}">
										</td>
										<td class="align-middle">
											<span th:if="${user.role == T(com.example.simpleforum.model.Role).ADMIN}" class="badge bg-danger"> ADMIN </span> 
											<span th:if="${user.role == T(com.example.simpleforum.model.Role).USER}"class="badge bg-secondary"> USER </span>
										</td>
										<td class="align-middle" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
										<!-- 削除ボタン -->
										<td class="align-middle">
										    <!-- 自分以外のユーザーのみ削除可能 -->
										    <form th:if="${!user.id.equals(loginUser.id)}" th:action="@{/admin/user/delete/{id}(id=${user.id})}" method="post" class="d-inline">
										        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('このユーザーを削除しますか？');">削除</button>
										    </form>
										    <!-- 自分自身 -->
										    <span th:if="${user.id.equals(loginUser.id)}" class="btn btn-sm btn-primary">自分</span>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
					<div class="text-center mt-4">
						<a href="/posts" class="btn btn-secondary px-4"> タイトルページへ </a>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
